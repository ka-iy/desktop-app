name: "Security Scan (gosec)"

on:
  pull_request:
    branches: [ master, beta, development, test ]
  push:
    branches: [ master, beta, development, test ]

permissions: read-all

jobs:
  testsLinux:
    name: Tests (runs on Linux)
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    env:
      GO111MODULE: on
    steps:
      - name: Checkout Source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run Gosec Security Scanner
        uses: securego/gosec@223e19b8856e00f02cc67804499a83f77e208f3c # v2.25.0
        with:
          # we let the report trigger content trigger a failure using the GitHub Security features.
          args: '-exclude=G104,G307 -no-fail -fmt sarif -out results.sarif ./...'
      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@38697555549f1db7851b81482ff19f1fa5c4fedc # v4
        with:
          # Path to SARIF file relative to the root of the repository
          sarif_file: results.sarif
