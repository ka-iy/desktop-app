name: "Security Scan (gosec)"

on:
  pull_request:
    branches: [ master, beta, development, test ]
  push:
    branches: [ master, beta, development, test ]

permissions: read-all

jobs:
  testsLinux:
    name: Tests (runs on Linux)
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    env:
      GO111MODULE: on
    steps:
      - name: Checkout Source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Run Gosec Security Scanner
        uses: securego/gosec@9e6a9843d7a4a6e3e9a8539b02612c8a4aa3f889 # v2.27.1
        with:
          # we let the report trigger content trigger a failure using the GitHub Security features.
          args: '-exclude=G104,G307 -no-fail -fmt sarif -out results.sarif ./...'
      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4
        with:
          # Path to SARIF file relative to the root of the repository
          sarif_file: results.sarif
